<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
  <title>Ngân Hà 3D - Nguyễn Thị Bông</title>
  <style>
    :root {
      --bg: #03000a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      overflow: hidden;
      font-family: 'Quicksand', 'Segoe UI', 'Arial', sans-serif;
      height: 100dvh;
      width: 100vw;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      touch-action: pan-x pan-y pinch-zoom; /* để orbit controls xử lý */
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    canvas {
      display: block;
    }

    /* Lớp tên */
    .name-overlay {
      position: fixed;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      text-align: center;
      width: 100%;
      max-width: 90vw;
    }

    .name-text {
      font-size: clamp(2rem, 6vw, 4.2rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg,
          #ffefb5 0%, #ffc1cc 25%, #dfb0ff 50%,
          #ffddaa 75%, #ffc0cb 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(255, 180, 210, 0.9))
              drop-shadow(0 0 35px rgba(220, 150, 255, 0.8))
              drop-shadow(0 0 60px rgba(255, 190, 120, 0.6))
              drop-shadow(0 0 100px rgba(255, 160, 200, 0.5));
      animation: nameFloat 4s ease-in-out infinite, gradientShift 8s ease-in-out infinite;
      text-shadow: none;
      line-height: 1.2;
    }

    @keyframes nameFloat {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-12px); }
      60% { transform: translateY(5px); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
    }

    /* Sparkle quanh tên */
    .sparkles-container {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(320px, 80vw);
      height: 120px;
      pointer-events: none;
      z-index: 9;
    }
    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      animation: sparkleFloat 2.2s ease-in-out infinite;
      box-shadow: 0 0 8px 2px rgba(255, 220, 180, 0.9), 0 0 16px 5px rgba(255, 180, 220, 0.5);
    }
    @keyframes sparkleFloat {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 1; transform: translateY(-25px) scale(1.5); }
      45% { opacity: 0.6; transform: translateY(-40px) scale(0.7); }
      65% { opacity: 1; transform: translateY(-30px) scale(1.3); }
      85% { opacity: 0; transform: translateY(-55px) scale(0); }
    }

    /* Gợi ý chạm */
    .hint-text {
      position: fixed;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      color: rgba(255, 255, 255, 0.85);
      font-size: clamp(0.8rem, 2.5vw, 1.05rem);
      letter-spacing: 0.06em;
      text-align: center;
      animation: hintPulse 3s ease-in-out infinite;
      text-shadow: 0 0 18px rgba(255, 200, 220, 0.7), 0 0 35px rgba(180, 150, 255, 0.4);
      backdrop-filter: blur(2px);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.2);
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.45; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-6px); }
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 20, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .modal-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: linear-gradient(160deg, rgba(25, 15, 45, 0.96) 0%, rgba(18, 8, 35, 0.98) 100%);
      border: 1.5px solid rgba(255, 210, 240, 0.5);
      border-radius: 28px;
      padding: clamp(1.5rem, 5vw, 2.8rem);
      max-width: 400px;
      width: 88%;
      text-align: center;
      box-shadow:
        0 0 70px rgba(210, 140, 230, 0.45),
        0 0 140px rgba(255, 160, 190, 0.3),
        0 25px 60px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: scale(0.6) translateY(40px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: visible;
    }
    .modal-backdrop.active .modal-card {
      transform: scale(1) translateY(0);
    }
    .modal-icon {
      font-size: 3.8rem;
      margin-bottom: 0.5rem;
      animation: iconBounce 0.7s ease-out;
    }
    @keyframes iconBounce {
      0% { transform: scale(0); opacity: 0; }
      55% { transform: scale(1.4); }
      75% { transform: scale(0.85); }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-wish {
      font-size: clamp(1.1rem, 3.5vw, 1.45rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.5;
      margin: 0.7rem 0 1.3rem;
      background: linear-gradient(135deg, #ffe4c4, #ffd4e8, #e8d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-close-btn {
      background: linear-gradient(135deg, #ff6392, #b03eff);
      border: none;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.7rem 2.3rem;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 8px 30px rgba(190, 80, 170, 0.55);
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-close-btn:active {
      transform: scale(0.93);
      transition: transform 0.1s;
    }

    @media (max-width: 480px) {
      .name-overlay { top: 3%; }
      .name-text { font-size: clamp(1.8rem, 7vw, 2.6rem); }
      .hint-text { bottom: 5%; font-size: 0.75rem; }
      .modal-card { padding: 1.2rem; border-radius: 22px; }
      .modal-icon { font-size: 3rem; }
      .modal-wish { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="name-overlay">
    <div class="name-text">Nguyễn Thị Bông</div>
  </div>
  <div class="sparkles-container" id="sparklesContainer"></div>

  <div class="hint-text" id="hintText">✨ Chạm vào hộp quà để nhận lời chúc ✨</div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal-card" id="modalCard">
      <div class="modal-icon" id="modalIcon">🎁</div>
      <p class="modal-wish" id="modalWish"></p>
      <button class="modal-close-btn" id="modalCloseBtn">Đóng lại 💫</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== DOM ====================
    const container = document.getElementById('canvas-container');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalWish = document.getElementById('modalWish');
    const modalIcon = document.getElementById('modalIcon');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const hintText = document.getElementById('hintText');
    const sparklesContainer = document.getElementById('sparklesContainer');

    // ==================== WISHES ====================
    const wishes = [
      { icon: '🌸', text: 'Chúc Bông luôn tươi tắn và hạnh phúc như những cánh hoa đầu xuân!' },
      { icon: '✨', text: 'Mong mọi điều tuyệt vời nhất trong vũ trụ này sẽ đến với Bông!' },
      { icon: '🍬', text: 'Ngọt ngào và vui vẻ mỗi ngày, Bông nhé!' },
      { icon: '⭐', text: 'Luôn tỏa sáng như vì sao rực rỡ nhất trên bầu trời đêm!' },
      { icon: '💖', text: 'Sức khỏe dồi dào, bình an và thành công luôn bên Bông!' },
      { icon: '🌟', text: 'Bông chính là ánh sáng quý giá nhất của ngân hà này!' },
      { icon: '💪', text: 'Hãy luôn mạnh mẽ và tự tin, Bông làm được tất cả!' },
      { icon: '🎀', text: 'Chúc Bông gặp nhiều may mắn và điều kỳ diệu trong cuộc sống!' },
      { icon: '🦋', text: 'Như cánh bướm bay giữa tinh tú, chúc Bông tự do và hạnh phúc!' },
      { icon: '🌙', text: 'Dưới ánh trăng dịu dàng, chúc Bông những giấc mơ đẹp nhất!' },
      { icon: '🎵', text: 'Cuộc sống của Bông là một bản nhạc du dương và lãng mạn!' },
      { icon: '💎', text: 'Bông là viên kim cương lấp lánh giữa không gian vô tận!' },
    ];
    let lastWishIndex = -1;
    let isModalOpen = false;
    let giftCooldown = false;

    function getRandomWish() {
      let idx;
      do { idx = Math.floor(Math.random() * wishes.length); }
      while (idx === lastWishIndex && wishes.length > 1);
      lastWishIndex = idx;
      return wishes[idx];
    }

    // ==================== SPARKLES ====================
    function createSparkles() {
      sparklesContainer.innerHTML = '';
      for (let i = 0; i < 28; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = (10 + Math.random() * 80) + '%';
        s.style.top = (5 + Math.random() * 90) + '%';
        s.style.animationDelay = Math.random() * 3.5 + 's';
        s.style.animationDuration = (1.8 + Math.random() * 3.5) + 's';
        s.style.width = (2 + Math.random() * 3.5) + 'px';
        s.style.height = s.style.width;
        const colors = ['#ffd700','#ffb8d4','#ffffff','#e8d4ff','#ffc8a0','#a0d4ff'];
        s.style.background = colors[Math.floor(Math.random() * colors.length)];
        s.style.boxShadow = `0 0 ${5+Math.random()*10}px ${1+Math.random()*3}px ${s.style.background}`;
        sparklesContainer.appendChild(s);
      }
    }
    createSparkles();
    setInterval(createSparkles, 4000);

    // ==================== THREEJS SETUP ====================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#03000a', 0.00012);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.8, 65);
    camera.position.set(4, 11, 18);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // Orbit Controls (xoay, zoom)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.45;
    controls.zoomSpeed = 0.9;
    controls.panSpeed = 0.4;
    controls.target.set(0, 1.2, 0);
    controls.update();
    controls.minDistance = 8;
    controls.maxDistance = 35;
    controls.maxPolarAngle = Math.PI * 0.75;
    controls.minPolarAngle = 0.2;
    controls.enablePan = true;
    // Cho phép touch một chạm xoay, hai chạm zoom/pan
    controls.touches = {
      ONE: THREE.TOUCH.ROTATE,
      TWO: THREE.TOUCH.DOLLY_PAN
    };

    // ==================== LIGHTING ====================
    scene.add(new THREE.AmbientLight('#2a1a3a', 1.6));
    const coreLight = new THREE.PointLight('#ffd1a8', 90, 28, 1.4);
    coreLight.position.set(0, 0.5, 0);
    coreLight.castShadow = true;
    coreLight.shadow.mapSize.width = 512;
    coreLight.shadow.mapSize.height = 512;
    coreLight.shadow.camera.near = 0.5;
    coreLight.shadow.camera.far = 30;
    scene.add(coreLight);
    const topLight = new THREE.DirectionalLight('#e8d0ff', 2.2);
    topLight.position.set(5, 12, 3);
    scene.add(topLight);
    const rimLight = new THREE.DirectionalLight('#ffb0c8', 1.8);
    rimLight.position.set(-5, 3, -6);
    scene.add(rimLight);

    // ==================== GALAXY ====================
    const galaxyGroup = new THREE.Group();
    scene.add(galaxyGroup);

    // Texture hạt
    const particleCanvas = document.createElement('canvas');
    particleCanvas.width = 64;
    particleCanvas.height = 64;
    const pctx = particleCanvas.getContext('2d');
    const gradient = pctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.08, 'rgba(255,240,255,0.98)');
    gradient.addColorStop(0.2, 'rgba(255,200,240,0.8)');
    gradient.addColorStop(0.45, 'rgba(180,140,255,0.3)');
    gradient.addColorStop(0.7, 'rgba(80,60,160,0.05)');
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    pctx.fillStyle = gradient;
    pctx.fillRect(0, 0, 64, 64);
    const particleTexture = new THREE.CanvasTexture(particleCanvas);

    // Hạt chính (galaxy disc)
    const mainCount = 14000;
    const mainGeom = new THREE.BufferGeometry();
    const mainPos = new Float32Array(mainCount * 3);
    const mainCol = new Float32Array(mainCount * 3);
    const mainSize = new Float32Array(mainCount);

    const arms = 5;
    const maxR = 9.5;
    const coreR = 0.9;

    for (let i = 0; i < mainCount; i++) {
      let x, y, z, r, angle;
      const isCore = i < 1800;
      if (isCore) {
        r = Math.pow(Math.random(), 0.7) * coreR;
        angle = Math.random() * Math.PI * 2;
        y = (Math.random() - 0.5) * 0.3 * (1 - r / coreR);
      } else {
        const armIdx = i % arms;
        const baseAngle = (armIdx / arms) * Math.PI * 2;
        const t = Math.random();
        r = coreR + Math.pow(t, 0.6) * (maxR - coreR);
        const spiral = baseAngle + r * 0.85;
        const scatter = (Math.random() - 0.5) * 0.65 * (1 + r * 0.2);
        angle = spiral + scatter;
        r += (Math.random() - 0.5) * (0.25 + r * 0.25);
        y = (Math.random() - 0.5) * 0.25 * (1 + r * 0.25);
        y += Math.sin(r * 1.4 + baseAngle) * 0.18;
      }
      x = Math.cos(angle) * r;
      z = Math.sin(angle) * r;
      mainPos[i * 3] = x;
      mainPos[i * 3 + 1] = y;
      mainPos[i * 3 + 2] = z;

      // Màu sắc
      let cr, cg, cb;
      if (r < 1.4) {
        cr = 1.0; cg = 0.88; cb = 0.6;
      } else if (r < 3.2) {
        const t2 = (r - 1.4) / 1.8;
        cr = 0.9 + Math.random() * 0.1;
        cg = 0.5 + Math.random() * 0.3;
        cb = 0.65 + Math.random() * 0.35;
      } else if (r < 5.5) {
        cr = 0.4 + Math.random() * 0.3;
        cg = 0.4 + Math.random() * 0.3;
        cb = 0.75 + Math.random() * 0.25;
      } else {
        cr = 0.2 + Math.random() * 0.25;
        cg = 0.25 + Math.random() * 0.35;
        cb = 0.65 + Math.random() * 0.35;
      }
      if (Math.random() < 0.07) {
        cr = Math.min(1, cr + 0.5);
        cg = Math.min(1, cg + 0.5);
        cb = Math.min(1, cb + 0.5);
      }
      mainCol[i * 3] = cr;
      mainCol[i * 3 + 1] = cg;
      mainCol[i * 3 + 2] = cb;
      mainSize[i] = (0.4 + Math.random() * 2.8) * (r < 1 ? 1.7 : 1);
    }
    mainGeom.setAttribute('position', new THREE.BufferAttribute(mainPos, 3));
    mainGeom.setAttribute('color', new THREE.BufferAttribute(mainCol, 3));
    mainGeom.setAttribute('size', new THREE.BufferAttribute(mainSize, 1));

    const mainMat = new THREE.PointsMaterial({
      size: 0.1,
      map: particleTexture,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.95,
    });
    const galaxyPoints = new THREE.Points(mainGeom, mainMat);
    galaxyGroup.add(galaxyPoints);

    // Lõi phát sáng
    const coreGlowGeom = new THREE.SphereGeometry(0.75, 32, 32);
    const coreGlowMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColor: { value: new THREE.Color('#ffeac8') },
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vec4 worldPos = modelMatrix * vec4(position, 1.0);
          vPosition = worldPos.xyz;
          vNormal = normalize(mat3(modelMatrix) * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;
        uniform vec3 uColor;
        void main() {
          vec3 viewDir = normalize(cameraPosition - vPosition);
          float fresnel = 1.0 - abs(dot(viewDir, vNormal));
          fresnel = pow(fresnel, 4.5);
          float alpha = fresnel * 0.95 + 0.08;
          float pulse = 1.0 + sin(uTime * 4.0) * 0.25;
          vec3 glow = uColor * (1.2 + fresnel * 0.8) * pulse;
          gl_FragColor = vec4(glow, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const coreGlow = new THREE.Mesh(coreGlowGeom, coreGlowMat);
    galaxyGroup.add(coreGlow);

    const innerCore = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 16, 16),
      new THREE.MeshBasicMaterial({ color: '#fffef5' })
    );
    galaxyGroup.add(innerCore);

    // Tinh vân (nebula clouds) bằng các cụm điểm mờ
    function createNebula(radius, color, opacity, count = 600) {
      const geom = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      const col = new Float32Array(count * 3);
      const baseColor = new THREE.Color(color);
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = radius * (0.7 + Math.random() * 0.3);
        pos[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
        pos[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r * 0.35;
        pos[i * 3 + 2] = Math.cos(phi) * r;
        const c = baseColor.clone().multiplyScalar(0.7 + Math.random() * 0.5);
        col[i * 3] = c.r;
        col[i * 3 + 1] = c.g;
        col[i * 3 + 2] = c.b;
      }
      geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
      const mat = new THREE.PointsMaterial({
        size: 0.25,
        map: particleTexture,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        opacity: opacity,
      });
      const points = new THREE.Points(geom, mat);
      points.rotation.x = Math.PI * 0.45;
      return points;
    }
    galaxyGroup.add(createNebula(4.2, '#ff9ec8', 0.25, 700));
    galaxyGroup.add(createNebula(5.8, '#c19eff', 0.22, 750));
    galaxyGroup.add(createNebula(7.5, '#7ec8ff', 0.2, 800));

    // Vòng xoắn ốc mờ
    const ringCount = 2500;
    const ringGeom = new THREE.BufferGeometry();
    const ringPos = new Float32Array(ringCount * 3);
    const ringCol = new Float32Array(ringCount * 3);
    for (let i = 0; i < ringCount; i++) {
      const arm = i % arms;
      const baseAngle = (arm / arms) * Math.PI * 2;
      const t = Math.random();
      const r = 1.2 + t * 8.2;
      const angle = baseAngle + r * 0.7 + (Math.random() - 0.5) * 0.5;
      const y = (Math.random() - 0.5) * 0.15;
      ringPos[i * 3] = Math.cos(angle) * r;
      ringPos[i * 3 + 1] = y;
      ringPos[i * 3 + 2] = Math.sin(angle) * r;
      ringCol[i * 3] = 0.7 + Math.random() * 0.3;
      ringCol[i * 3 + 1] = 0.5 + Math.random() * 0.4;
      ringCol[i * 3 + 2] = 0.8 + Math.random() * 0.2;
    }
    ringGeom.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
    ringGeom.setAttribute('color', new THREE.BufferAttribute(ringCol, 3));
    const ringMat = new THREE.PointsMaterial({
      size: 0.07,
      map: particleTexture,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.4,
    });
    galaxyGroup.add(new THREE.Points(ringGeom, ringMat));

    // ==================== BACKGROUND STARS ====================
    function createBgStars(count, spread, size, opacity) {
      const geom = new THREE.BufferGeometry();
      const pos = new Float32Array(count * 3);
      const col = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = spread * (0.85 + Math.random() * 0.15);
        pos[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
        pos[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
        pos[i * 3 + 2] = Math.cos(phi) * r;
        const bright = 0.6 + Math.random() * 0.4;
        col[i * 3] = bright;
        col[i * 3 + 1] = bright * (0.7 + Math.random() * 0.3);
        col[i * 3 + 2] = bright * (0.8 + Math.random() * 0.2);
      }
      geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
      const mat = new THREE.PointsMaterial({
        size: size,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        opacity: opacity,
        map: particleTexture,
      });
      return new THREE.Points(geom, mat);
    }
    scene.add(createBgStars(2000, 28, 0.09, 0.75));
    scene.add(createBgStars(1200, 38, 0.05, 0.5));

    // ==================== GIFT BOXES ====================
    const giftGroups = [];
    const giftData = [
      { pos: [3.6, 2.5, 3.2], boxCol: '#e84060', ribbonCol: '#ffd700' },
      { pos: [-3.3, 2.1, -3.0], boxCol: '#7b2fbe', ribbonCol: '#ffb8d4' },
      { pos: [2.2, 2.8, -3.7], boxCol: '#2563eb', ribbonCol: '#e0e7ff' },
      { pos: [-4.0, 1.9, 2.8], boxCol: '#db2777', ribbonCol: '#fde68a' },
      { pos: [0.6, 3.3, 4.3], boxCol: '#0d9488', ribbonCol: '#ffffff' },
    ];

    function createGiftBox(boxColorHex, ribbonColorHex) {
      const group = new THREE.Group();
      const size = 0.68;
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(size, size, size, 2, 2, 2),
        new THREE.MeshStandardMaterial({ color: boxColorHex, roughness: 0.3, metalness: 0.1 })
      );
      box.castShadow = box.receiveShadow = true;
      box.name = 'giftBoxMain';
      group.add(box);

      const ribbonMat = new THREE.MeshStandardMaterial({ color: ribbonColorHex, roughness: 0.2, metalness: 0.6 });
      const rh = new THREE.Mesh(new THREE.BoxGeometry(size + 0.06, 0.08, 0.2), ribbonMat);
      rh.position.y = size / 2;
      rh.castShadow = true;
      group.add(rh);
      const rv = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, size + 0.06), ribbonMat);
      rv.position.y = size / 2;
      rv.castShadow = true;
      group.add(rv);

      const knot = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), ribbonMat);
      knot.position.y = size / 2 + 0.05;
      knot.castShadow = true;
      group.add(knot);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(size * 0.78, 0.03, 16, 32),
        new THREE.MeshBasicMaterial({ color: ribbonColorHex, transparent: true, opacity: 0.5, depthWrite: false })
      );
      ring.rotation.x = Math.PI / 2;
      ring.name = 'glowRing';
      group.add(ring);

      group.userData = {
        boxColor: boxColorHex,
        ribbonColor: ribbonColorHex,
        basePos: new THREE.Vector3(),
        bobPhase: Math.random() * Math.PI * 2,
      };
      return group;
    }

    giftData.forEach((d, i) => {
      const gift = createGiftBox(d.boxCol, d.ribbonCol);
      gift.position.set(d.pos[0], d.pos[1], d.pos[2]);
      gift.userData.basePos.copy(gift.position);
      scene.add(gift);
      giftGroups.push(gift);
    });

    // ==================== SHOOTING STARS ====================
    const shootingStars = [];
    function spawnShootingStar() {
      const start = new THREE.Vector3(
        (Math.random() - 0.5) * 22,
        6 + Math.random() * 9,
        (Math.random() - 0.5) * 18
      );
      const dir = new THREE.Vector3((Math.random() - 0.5) * 0.4, -0.7 - Math.random() * 0.3, (Math.random() - 0.5) * 0.4).normalize();
      const length = 1.8 + Math.random() * 3.5;
      const end = start.clone().add(dir.clone().multiplyScalar(length));
      const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
      const mat = new THREE.LineBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0.9, depthWrite: false, blending: THREE.AdditiveBlending });
      const line = new THREE.Line(geom, mat);
      line.userData = { velocity: dir.clone().multiplyScalar(10 + Math.random() * 18), life: 0.6 + Math.random() * 1.0, age: 0 };
      scene.add(line);
      shootingStars.push(line);
    }

    // ==================== EXPLOSION PARTICLES ====================
    const explosions = [];
    function createExplosion(worldPos, colorHex) {
      const group = new THREE.Group();
      group.position.copy(worldPos);
      const color = new THREE.Color(colorHex);
      const count = 100;
      const parts = [];
      for (let i = 0; i < count; i++) {
        const geom = new THREE.SphereGeometry(0.04 + Math.random() * 0.08, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: color.clone().multiplyScalar(0.6 + Math.random() * 0.6), transparent: true, depthWrite: false });
        const p = new THREE.Mesh(geom, mat);
        const dir = new THREE.Vector3((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2).normalize();
        p.userData = { vel: dir.multiplyScalar(2 + Math.random() * 5.5), life: 1 };
        group.add(p);
        parts.push(p);
      }
      scene.add(group);
      explosions.push({ group, parts, timer: 1.6 });
    }

    // ==================== RAYCASTER ====================
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 0.3;
    const mouse = new THREE.Vector2();
    function getGiftFromEvent(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      mouse.set(x, y);
      raycaster.setFromCamera(mouse, camera);
      const targets = [];
      giftGroups.forEach(g => g.children.forEach(c => { if (c.name === 'giftBoxMain' || c.name === 'glowRing') targets.push(c); }));
      const intersects = raycaster.intersectObjects(targets, false);
      if (intersects.length) {
        for (const inter of intersects) {
          let obj = inter.object;
          while (obj) {
            if (giftGroups.includes(obj)) return obj;
            obj = obj.parent;
          }
        }
      }
      return null;
    }

    function openGift(gift) {
      if (isModalOpen || giftCooldown) return;
      giftCooldown = true;
      const worldPos = new THREE.Vector3();
      gift.getWorldPosition(worldPos);
      createExplosion(worldPos, gift.userData.boxColor);
      gift.scale.set(1.35, 1.35, 1.35);
      setTimeout(() => gift.scale.set(1, 1, 1), 250);
      const wish = getRandomWish();
      modalIcon.textContent = wish.icon;
      modalWish.textContent = wish.text;
      modalIcon.style.animation = 'none';
      void modalIcon.offsetWidth;
      modalIcon.style.animation = 'iconBounce 0.7s ease-out';
      modalBackdrop.classList.add('active');
      isModalOpen = true;
      hintText.style.opacity = '0';
      setTimeout(() => { giftCooldown = false; }, 800);
    }

    function closeModal() {
      modalBackdrop.classList.remove('active');
      isModalOpen = false;
      setTimeout(() => { hintText.style.opacity = ''; }, 400);
    }

    renderer.domElement.addEventListener('click', (e) => {
      const gift = getGiftFromEvent(e);
      if (gift) openGift(gift);
    });
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        const gift = getGiftFromEvent(e.touches[0]);
        if (gift) {
          e.preventDefault();
          openGift(gift);
        }
      }
    }, { passive: false });

    modalCloseBtn.addEventListener('click', (e) => { e.stopPropagation(); closeModal(); });
    modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && isModalOpen) closeModal(); });

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ==================== ANIMATION LOOP ====================
    const clock = new THREE.Clock();
    let shootTimer = 0;

    function animate(timestamp) {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.15);
      const elapsed = timestamp * 0.001;

      controls.update();

      // Galaxy xoay nhẹ
      galaxyGroup.rotation.y += 0.06 * dt;
      galaxyGroup.rotation.x = Math.sin(elapsed * 0.12) * 0.1;

      coreGlowMat.uniforms.uTime.value = elapsed;

      // Gift boxes chuyển động
      giftGroups.forEach((gift) => {
        const base = gift.userData.basePos;
        const bob = Math.sin(elapsed * 1.3 + gift.userData.bobPhase) * 0.5;
        gift.position.y = base.y + bob;
        gift.rotation.y += 0.75 * dt;
        gift.rotation.x += 0.25 * dt;
        const ring = gift.getObjectByName('glowRing');
        if (ring) {
          ring.rotation.z += 1.2 * dt;
          ring.material.opacity = 0.3 + Math.sin(elapsed * 3.5 + gift.userData.bobPhase) * 0.25;
        }
      });

      // Explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        const sys = explosions[i];
        sys.timer -= dt;
        if (sys.timer <= 0) {
          scene.remove(sys.group);
          sys.parts.forEach(p => { p.material.dispose(); p.geometry.dispose(); });
          explosions.splice(i, 1);
        } else {
          sys.parts.forEach(p => {
            p.position.add(p.userData.vel.clone().multiplyScalar(dt));
            p.userData.vel.y += 2.2 * dt;
            p.userData.life -= 1.5 * dt;
            p.material.opacity = Math.max(0, p.userData.life);
            p.scale.setScalar(Math.max(0.01, p.userData.life));
          });
        }
      }

      // Shooting stars
      shootTimer += dt;
      if (shootTimer > 1.8 && shootingStars.length < 4) {
        shootTimer = 0;
        spawnShootingStar();
      }
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const star = shootingStars[i];
        star.userData.age += dt;
        if (star.userData.age > star.userData.life) {
          scene.remove(star);
          star.geometry.dispose();
          star.material.dispose();
          shootingStars.splice(i, 1);
        } else {
          const prog = star.userData.age / star.userData.life;
          star.material.opacity = prog < 0.2 ? prog / 0.2 : prog > 0.7 ? (1 - prog) / 0.3 : 1;
          const posArr = star.geometry.attributes.position.array;
          for (let j = 0; j < 6; j++) posArr[j] += star.userData.velocity.getComponent(j % 3) * dt;
          star.geometry.attributes.position.needsUpdate = true;
        }
      }

      renderer.render(scene, camera);
    }

    // Khởi động
    for (let i = 0; i < 2; i++) setTimeout(spawnShootingStar, i * 700);
    requestAnimationFrame(animate);

    console.log('%c🌌 Dải Ngân Hà 3D - Nguyễn Thị Bông 🌌', 'font-size:1.6em; color:#ffb8d4;');
    console.log('%c✨ Xoay, zoom thoải mái | Chạm hộp quà để nhận lời chúc', 'color:#ffd700;');
  </script>
</body>
</html>
